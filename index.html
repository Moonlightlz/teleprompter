<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1115">
  <meta name="description" content="Teleprompter profesional: pega tu texto y reproduce. Velocidad, fuente, espejo, guía de lectura y más, todo ajustable.">
  <title>Teleprompter</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <!-- ============ VISTA EDITOR ============ -->
  <main id="editor-view">
    <header class="topbar">
      <div class="brand">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="2" y="3" width="20" height="18" rx="3" fill="#1c212b"/>
          <rect x="5" y="7" width="14" height="2" rx="1" fill="#8b93a5"/>
          <rect x="5" y="11" width="10" height="2" rx="1" fill="#8b93a5"/>
          <path d="M9 15.5l7 3.5-7 3.5v-7z" transform="translate(0,-3.5)" fill="#ffd43b"/>
        </svg>
        <h1>Teleprompter</h1>
      </div>
      <div class="topbar-actions">
        <span id="stats" class="stats" title="Estimación a 150 palabras por minuto"></span>
        <button id="btn-install" class="btn ghost hidden" title="Instalar como aplicación">⬇ Instalar</button>
        <button id="btn-settings" class="btn ghost" title="Ajustes (vista previa en vivo)">⚙ Ajustes</button>
        <button id="btn-play" class="btn primary" title="Reproducir (Ctrl+Enter)">▶ Reproducir</button>
      </div>
    </header>

    <textarea id="script-input" placeholder="Pega o escribe aquí tu guion…

Deja una línea en blanco para separar párrafos.

Cuando estés listo, pulsa ▶ Reproducir (o Ctrl+Enter)." spellcheck="false"></textarea>

    <footer class="editor-footer">
      <span class="hint">Atajos en el prompter: <kbd>Espacio</kbd> pausa · <kbd>↑</kbd><kbd>↓</kbd> velocidad · <kbd>←</kbd><kbd>→</kbd> saltar · <kbd>Inicio</kbd> reiniciar · <kbd>F</kbd> pantalla completa · <kbd>M</kbd> espejo · <kbd>Esc</kbd> salir</span>
      <button id="btn-clear" class="btn ghost small" title="Borrar todo el texto">🗑 Limpiar</button>
    </footer>
  </main>

  <!-- ============ VISTA PROMPTER ============ -->
  <section id="prompter-view" class="hidden">
    <div id="prompter-stage">
      <div id="prompter-viewport">
        <div id="prompter-content"></div>
      </div>
    </div>

    <div id="guide" aria-hidden="true">
      <div class="guide-arrow"></div>
      <div class="guide-line"></div>
    </div>

    <div id="countdown" class="hidden"><span id="countdown-num">3</span></div>

    <div id="end-overlay" class="hidden">
      <p>Fin del guion</p>
      <div>
        <button id="btn-replay" class="btn primary">↺ Repetir</button>
        <button id="btn-end-edit" class="btn ghost">✎ Editar</button>
      </div>
    </div>

    <div id="prompter-controls">
      <div id="progress" title="Clic para saltar a esa posición"><div id="progress-fill"></div></div>
      <div class="controls-row">
        <div class="controls-group">
          <button id="btn-exit" class="ctl" title="Volver al editor (Esc)">✎ Editar</button>
          <button id="btn-restart" class="ctl" title="Reiniciar (Inicio)">⏮</button>
          <button id="btn-toggle" class="ctl big" title="Reproducir / Pausar (Espacio)">⏸</button>
        </div>
        <div class="controls-group">
          <span class="ctl-label">Velocidad</span>
          <button id="btn-speed-down" class="ctl" title="Más lento (↓)">−</button>
          <span id="speed-display" class="ctl-value">80</span>
          <button id="btn-speed-up" class="ctl" title="Más rápido (↑)">+</button>
        </div>
        <div class="controls-group">
          <span class="ctl-label">Letra</span>
          <button id="btn-font-down" class="ctl" title="Reducir letra (-)">A−</button>
          <button id="btn-font-up" class="ctl" title="Aumentar letra (+)">A+</button>
        </div>
        <div class="controls-group">
          <span id="time-display" class="ctl-value wide" title="Tiempo restante estimado">--:--</span>
          <button id="btn-mirror" class="ctl" title="Espejo horizontal (M)">🪞</button>
          <button id="btn-fullscreen" class="ctl" title="Pantalla completa (F)">⛶</button>
          <button id="btn-settings-2" class="ctl" title="Ajustes">⚙</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ PANEL DE AJUSTES ============ -->
  <div id="settings-backdrop" class="hidden"></div>
  <aside id="settings-panel" class="hidden" aria-label="Ajustes">
    <header class="settings-header">
      <h2>Ajustes</h2>
      <button id="btn-close-settings" class="btn ghost" title="Cerrar (Esc)">✕</button>
    </header>

    <!-- Vista previa en vivo -->
    <div class="preview-wrap">
      <div id="preview-viewport">
        <div id="preview-stage">
          <div id="preview-scale">
            <div id="preview-content"></div>
          </div>
        </div>
        <div id="preview-guide">
          <div class="guide-arrow"></div>
          <div class="guide-line"></div>
        </div>
      </div>
      <span class="preview-label">Vista previa en vivo · escala 40 %</span>
    </div>

    <div class="settings-body">

      <section>
        <h3>Velocidad</h3>
        <label class="row">
          <span>Modo</span>
          <select id="set-mode">
            <option value="fixed">Velocidad fija</option>
            <option value="duration">Duración total</option>
          </select>
        </label>
        <label class="row" id="row-speed">
          <span>Velocidad <output id="out-speed">80</output> px/s</span>
          <input type="range" id="set-speed" min="10" max="400" step="5">
        </label>
        <label class="row hidden" id="row-duration">
          <span>Duración (mm:ss)</span>
          <input type="text" id="set-duration" placeholder="02:00" pattern="[0-9]{1,3}:[0-5][0-9]">
        </label>
        <label class="row">
          <span>Cuenta regresiva <output id="out-countdown">3</output> s</span>
          <input type="range" id="set-countdown" min="0" max="10" step="1">
        </label>
        <label class="row check">
          <input type="checkbox" id="set-autofull">
          <span>Pantalla completa al reproducir</span>
        </label>
      </section>

      <section>
        <h3>Texto</h3>
        <label class="row">
          <span>Tamaño <output id="out-fontsize">64</output> px</span>
          <input type="range" id="set-fontsize" min="24" max="160" step="2">
        </label>
        <label class="row">
          <span>Fuente</span>
          <select id="set-font">
            <option value="system-ui, sans-serif">Sistema</option>
            <option value="Arial, sans-serif">Arial</option>
            <option value="Verdana, sans-serif">Verdana</option>
            <option value="Tahoma, sans-serif">Tahoma</option>
            <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="'Times New Roman', serif">Times New Roman</option>
            <option value="'Courier New', monospace">Courier New</option>
            <option value="Impact, sans-serif">Impact</option>
          </select>
        </label>
        <label class="row check">
          <input type="checkbox" id="set-bold">
          <span>Negrita</span>
        </label>
        <label class="row">
          <span>Interlineado <output id="out-lineheight">1.5</output></span>
          <input type="range" id="set-lineheight" min="1" max="2.5" step="0.1">
        </label>
        <label class="row">
          <span>Espaciado letras <output id="out-letterspacing">0</output> px</span>
          <input type="range" id="set-letterspacing" min="0" max="10" step="0.5">
        </label>
        <label class="row">
          <span>Alineación</span>
          <select id="set-align">
            <option value="center">Centrado</option>
            <option value="left">Izquierda</option>
            <option value="right">Derecha</option>
          </select>
        </label>
      </section>

      <section>
        <h3>Colores</h3>
        <div class="preset-row">
          <button class="preset" data-text="#ffffff" data-bg="#000000" title="Blanco sobre negro" style="color:#fff;background:#000">Aa</button>
          <button class="preset" data-text="#ffd43b" data-bg="#000000" title="Amarillo sobre negro (clásico)" style="color:#ffd43b;background:#000">Aa</button>
          <button class="preset" data-text="#000000" data-bg="#ffffff" title="Negro sobre blanco" style="color:#000;background:#fff">Aa</button>
          <button class="preset" data-text="#4ade80" data-bg="#000000" title="Verde sobre negro" style="color:#4ade80;background:#000">Aa</button>
          <button class="preset" data-text="#93c5fd" data-bg="#0a0f1e" title="Azul sobre azul oscuro" style="color:#93c5fd;background:#0a0f1e">Aa</button>
        </div>
        <label class="row">
          <span>Color del texto</span>
          <input type="color" id="set-textcolor">
        </label>
        <label class="row">
          <span>Color de fondo</span>
          <input type="color" id="set-bgcolor">
        </label>
      </section>

      <section>
        <h3>Diseño</h3>
        <label class="row">
          <span>Márgenes laterales <output id="out-margin">12</output> %</span>
          <input type="range" id="set-margin" min="0" max="35" step="1">
        </label>
        <label class="row">
          <span>Guía de lectura</span>
          <select id="set-guide">
            <option value="line">Línea</option>
            <option value="arrow">Flecha</option>
            <option value="both">Línea + flecha</option>
            <option value="none">Ninguna</option>
          </select>
        </label>
        <label class="row">
          <span>Posición guía <output id="out-guidepos">25</output> %</span>
          <input type="range" id="set-guidepos" min="10" max="70" step="1">
        </label>
        <label class="row">
          <span>Opacidad guía <output id="out-guideopacity">60</output> %</span>
          <input type="range" id="set-guideopacity" min="10" max="100" step="5">
        </label>
        <label class="row">
          <span>Color guía</span>
          <input type="color" id="set-guidecolor">
        </label>
      </section>

      <section>
        <h3>Espejo (cristal de teleprompter)</h3>
        <label class="row check">
          <input type="checkbox" id="set-mirrorx">
          <span>Voltear horizontal (espejo)</span>
        </label>
        <label class="row check">
          <input type="checkbox" id="set-mirrory">
          <span>Voltear vertical</span>
        </label>
      </section>

      <section>
        <button id="btn-reset" class="btn ghost full">↺ Restaurar valores por defecto</button>
      </section>

    </div>
  </aside>

  <script src="./app.js"></script>
</body>
</html>
